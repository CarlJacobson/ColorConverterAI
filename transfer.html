<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tints the iOS status-bar / Dynamic Island area to match the nav bar. -->
    <meta name="theme-color" content="#333333" />
    <title>Extract and Transfer Color Palettes From Images Online - ColorConverter.ai</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LWSFGEX94P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LWSFGEX94P');
    </script>

    <link rel="stylesheet" type="text/css" href="static/styles/98.css" />
    <link rel="icon" href="static/favicon.ico" />
  </head>

  <body ontouchstart>
    <header class="top-bar">
      <img src="static/transparent_logo_gif.gif" alt="ColorConverter.ai logo" class="top-bar-logo" />
      <h1 class="top-bar-title"><a href="index.html">ColorConverter.ai</a></h1>

      <nav class="topnav">
        <a href="index.html" class="home">Home</a>
        <a href="extractor.html" class="extractor">Palette Extractor</a>
        <a href="transfer.html" class="transfer active">Palette Transfer</a>
        <a href="about.html" class="about">About</a>
      </nav>
    </header>

    <div id="content">
      <hr />
      <main>
        <h1 class="page-title">Transfer color palette to target image</h1>
        <div class="Row">
          <div class="column">
            <div class="window">
              <div class="title-bar">
                <div class="title-bar-controls">
                  <img src="static/image_icon.png" class="title-bar-icon" alt="" />
                </div>
                <div class="title-bar-text">Upload Target Image</div>
                <div class="title-bar-controls">
                  <button aria-label="Help" onclick="location.href='about.html'"></button>
                  <button aria-label="Close"></button>
                </div>
              </div>
              <div class="window-body">
                <div id="target-display-image" class="window-image" role="img" aria-label="Target image preview"></div>
              </div>
              <div class="window-bottom">
                <input type="file" id="target-image-input" accept="image/jpeg, image/png, image/jpg" />
                <button type="button" id="invert-target">Invert Target Image</button>
              </div>
            </div>
          </div>

          <div class="column">
            <span class="equation-text">+</span>
            <button type="button" id="flip-btn">Flip Images</button>
          </div>

          <div class="column">
            <div class="window">
              <div class="title-bar">
                <div class="title-bar-controls">
                  <img src="static/palette_icon.png" class="title-bar-icon" alt="" />
                </div>
                <div class="title-bar-text">Upload Palette Image</div>
                <div class="title-bar-controls">
                  <button aria-label="Help" onclick="location.href='about.html'"></button>
                  <button aria-label="Close"></button>
                </div>
              </div>
              <div class="window-body">
                <div id="palette-display-image" class="window-image" role="img" aria-label="Palette image preview"></div>
              </div>
              <div class="window-bottom">
                <input type="file" id="palette-image-input" accept="image/jpeg, image/png, image/jpg" />
                <button type="button" id="invert-palette">Invert Palette Image</button>
                <h3>Number of colors to extract from image:</h3>
                <input id="k_slider" class="k-slider" type="range" value="20" min="2" max="200" name="k_value_transfer" />
                <p id="k_disp">20</p>
              </div>
            </div>
          </div>

          <div class="column">
            <span class="equation-text">=</span>
          </div>

          <div class="column">
            <div class="window">
              <div class="title-bar">
                <div class="title-bar-controls">
                  <img src="static/output_icon.png" class="title-bar-icon" alt="" />
                </div>
                <div class="title-bar-text">Output Image</div>
                <div class="title-bar-controls">
                  <button aria-label="Help" onclick="location.href='about.html'"></button>
                  <button aria-label="Close"></button>
                </div>
              </div>
              <div class="window-body">
                <a id="output-display-link">
                  <div id="output-display-image" class="window-image" role="img" aria-label="Output image"></div>
                </a>
              </div>
              <div class="window-bottom">
                <button type="button" id="convert-btn">Convert</button>
                <button type="button" id="download-btn" disabled>Download</button>
                <p id="status" class="status-message" style="display: none"></p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="copyright">&copy; 2022 ColorConverter.ai</div>
        <a href="about.html" class="b-button">
          <img src="static/faq.svg" class="iconicon" alt="" />
          <span class="b-button-label">&nbsp;About&nbsp;</span>
        </a>
      </div>
    </footer>

    <script type="module" src="static/js/transfer.js"></script>
  </body>
</html>
